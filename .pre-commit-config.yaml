repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-quick
        name: pytest quick suite
        entry: pytest -q
        language: system
        pass_filenames: false
